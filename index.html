<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V13 QUANT PRO | MA-EMA-RSI-BOLL-CMF-MFI-MACD-OBV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050608; color: #cbd5e1; -webkit-tap-highlight-color: transparent; }
        .neon-green { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }
        .card-quant { background: #11141b; border: 1px solid #1e293b; border-radius: 18px; }
        .active-tab { background: #00ff88 !important; color: #000 !important; border-color: #00ff88 !important; }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-50 bg-[#050608]/90 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic neon-green tracking-tighter uppercase">RZKY<span class="text-white">SPOT</span></h1>
                <p id="kurs-text" class="text-[9px] text-yellow-500 font-bold uppercase mt-1 tracking-widest italic">Memuat Kurs...</p>
            </div>
            <button onclick="runQuantScan()" id="btn-scan" class="bg-white text-black font-black px-5 py-2.5 rounded-xl text-[10px] uppercase active:scale-90 transition-all">
                SCAN MARKET
            </button>
        </div>
    </header>

    <div class="p-4 max-w-xl mx-auto space-y-4">
        <div class="flex gap-2 overflow-x-auto custom-scroll">
            <button id="f-all" onclick="setFilter('ALL')" class="active-tab flex-none px-5 py-2 rounded-full border border-slate-800 bg-[#11141b] text-[10px] font-bold uppercase">ALL</button>
            <button id="f-high" onclick="setFilter('HIGH')" class="flex-none px-5 py-2 rounded-full border border-slate-800 bg-[#11141b] text-[10px] font-bold uppercase text-[#00ff88]">🔥 High Score</button>
            <button id="f-sqz" onclick="setFilter('SQUEEZE')" class="flex-none px-5 py-2 rounded-full border border-slate-800 bg-[#11141b] text-[10px] font-bold uppercase text-blue-400">💎 Squeeze</button>
        </div>
        <input type="text" id="search" placeholder="Cari Pair (Contoh: BTC, DOGE...)" oninput="renderDisplay()" class="w-full bg-[#11141b] border border-slate-800 rounded-2xl px-5 py-4 text-xs outline-none focus:border-[#00ff88]">
    </div>

    <main id="main-list" class="px-4 max-w-xl mx-auto space-y-3">
        <div class="py-20 text-center text-slate-600 italic text-xs">Tekan SCAN untuk memulai analisis 9 Indikator.</div>
    </main>

    <div id="modal" class="fixed inset-0 z-[60] hidden bg-black flex flex-col">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center">
            <h2 id="m-symbol" class="text-2xl font-black text-white italic tracking-tighter">---</h2>
            <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-900 text-white text-3xl">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <div id="tv-box" class="w-full h-[320px] rounded-2xl border border-slate-800 overflow-hidden"></div>
            <div class="card-quant p-6 space-y-6">
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1 italic">Buy Zone</p>
                        <p id="m-entry" class="text-lg font-black text-white"></p>
                    </div>
                    <div class="p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                        <p class="text-[9px] text-[#00ff88] uppercase font-bold mb-1 italic">Target TP</p>
                        <p id="m-tp" class="text-lg font-black text-[#00ff88]"></p>
                    </div>
                </div>
                <div class="p-4 bg-red-500/5 rounded-xl border border-red-500/20 text-center">
                    <p class="text-[9px] text-red-500 uppercase font-bold mb-1 italic">Stop Loss</p>
                    <p id="m-sl" class="text-md font-black text-red-500"></p>
                </div>
                <div class="space-y-3">
                    <h3 class="text-[10px] text-slate-500 uppercase font-black italic tracking-widest">Logic Confirmation:</h3>
                    <div id="m-reasons" class="space-y-2 text-[11px] font-bold text-slate-300"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let kurs = 16250;
        let marketData = [];
        let currentFilter = 'ALL';

        async function fetchKurs() {
            try {
                const r = await fetch('https://api.exchangerate-api.com/v4/latest/USDT');
                const d = await r.json();
                kurs = d.rates.IDR;
                document.getElementById('kurs-text').innerText = `1 USDT = Rp ${kurs.toLocaleString('id-ID')}`;
            } catch(e) {}
        }

        async function runQuantScan() {
            const btn = document.getElementById('btn-scan');
            btn.disabled = true; btn.innerText = "...";
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const tickers = await res.json();
                const pairs = tickers.filter(t => t.symbol.endsWith('USDT') && parseFloat(t.quoteVolume) > 1000000);
                marketData = [];

                for (let i = 0; i < pairs.length; i += 30) {
                    const chunk = pairs.slice(i, i + 30);
                    const results = await Promise.all(chunk.map(async (coin) => {
                        try {
                            const kr = await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin.symbol}&interval=1h&limit=100`);
                            const kl = await kr.json();
                            return calculateFullQuant(coin, kl);
                        } catch(e) { return null; }
                    }));
                    marketData.push(...results.filter(r => r !== null));
                    renderDisplay();
                }
            } finally {
                btn.disabled = false; btn.innerText = "SCAN MARKET";
            }
        }

        function calculateFullQuant(ticker, klines) {
            const close = klines.map(k => parseFloat(k[4]));
            const vol = klines.map(k => parseFloat(k[5]));
            const high = klines.map(k => parseFloat(k[2]));
            const low = klines.map(k => parseFloat(k[3]));
            const now = close[close.length-1];
            
            // --- 9 INDICATOR LOGIC ---
            let score = 0;
            let reasons = [];
            let label = "NEUTRAL";

            // 1. MA/EMA (Trend)
            const ma20 = close.slice(-20).reduce((a,b)=>a+b)/20;
            const ema50 = calculateEMA(close, 50);
            if (now > ma20 && ma20 > ema50) { score += 15; reasons.push("MA/EMA: Golden Trend (Bullish)."); }

            // 2. RSI (Momentum)
            const rsi = calculateRSI(close, 14);
            if (rsi > 45 && rsi < 65) { score += 15; reasons.push("RSI: Momentum Sehat."); }

            // 3. Bollinger Bands (Volatility)
            const { upper, lower } = calculateBoll(close, 20, 2);
            const bandwidth = (upper - lower) / lower;
            if (bandwidth < 0.04) { score += 20; label = "SQUEEZE"; reasons.push("BOLL: Squeeze terdeteksi (Siap Breakout)."); }

            // 4. OBV & Volume (Money Inflow)
            const volAvg = vol.slice(-24).reduce((a,b)=>a+b)/24;
            if (vol[vol.length-1] > volAvg * 1.5) { score += 15; reasons.push("VOL: Spike Volume terdeteksi."); }
            
            // 5. MFI / CMF Proxy (Flow)
            if (now > close[close.length-2] && vol[vol.length-1] > volAvg) { score += 15; reasons.push("MFI/CMF: Uang masuk (Accumulation)."); }

            // 6. MACD Proxy
            const macdFast = calculateEMA(close, 12);
            const macdSlow = calculateEMA(close, 26);
            if (macdFast > macdSlow) { score += 20; reasons.push("MACD: Bullish Crossover."); }

            // --- PROTEKSI ---
            const change = parseFloat(ticker.priceChangePercent);
            if (change > 10 || rsi > 70) { score -= 60; reasons.push("RISK: Sudah Jenuh Beli (Overbought)."); }

            return {
                symbol: ticker.symbol, price: now, priceIDR: now * kurs,
                change, score, label,
                reasons, sl: now * 0.96, tp: now * 1.12
            };
        }

        // --- MATH HELPERS ---
        function calculateEMA(data, p) {
            const k = 2 / (p + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) ema = data[i] * k + ema * (1 - k);
            return ema;
        }

        function calculateRSI(close, p) {
            let g = 0, l = 0;
            for (let i = close.length - p; i < close.length; i++) {
                let d = close[i] - close[i-1];
                if (d >= 0) g += d; else l -= d;
            }
            return 100 - (100 / (1 + (g / l)));
        }

        function calculateBoll(data, p, std) {
            const slice = data.slice(-p);
            const avg = slice.reduce((a,b)=>a+b)/p;
            const sd = Math.sqrt(slice.map(x => Math.pow(x - avg, 2)).reduce((a,b)=>a+b)/p);
            return { upper: avg + (std * sd), lower: avg - (std * sd) };
        }

        function renderDisplay() {
            const list = document.getElementById('main-list');
            const search = document.getElementById('search').value.toUpperCase();
            let data = [...marketData].sort((a,b) => b.score - a.score);

            if (currentFilter === 'HIGH') data = data.filter(d => d.score >= 60);
            if (currentFilter === 'SQUEEZE') data = data.filter(d => d.label === 'SQUEEZE');
            if (search) data = data.filter(d => d.symbol.includes(search));

            list.innerHTML = data.map(c => `
                <div class="card-quant p-5 active:scale-95 transition-all" onclick="openDetail('${c.symbol}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-black text-white italic tracking-tighter">${c.symbol.replace('USDT','')}</h3>
                            <p class="text-[9px] font-bold uppercase mt-1 ${c.score > 50 ? 'text-[#00ff88]' : 'text-slate-500'}">${c.label === 'SQUEEZE' ? 'POTENSIAL BREAKOUT📈🚀' : 'EARLY MOVE📈'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-md font-black text-white">$${c.price.toLocaleString()}</p>
                            <p class="text-[9px] text-slate-500 font-bold">Rp ${c.priceIDR.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end mt-4 pt-3 border-t border-slate-800/50">
                        <div class="flex gap-4 text-[10px] font-black">
                            <div><p class="text-[8px] text-slate-500 uppercase">24h</p><p class="${c.change > 0 ? 'text-green-500' : 'text-red-500'}">${c.change}%</p></div>
                            <div><p class="text-[8px] text-slate-500 uppercase">Score</p><p class="${c.score > 50 ? 'text-[#00ff88]' : 'text-slate-400'}">${c.score}</p></div>
                        </div>
                        <div class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-xl italic uppercase">Detail</div>
                    </div>
                </div>
            `).join('');
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('button[id^="f-"]').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('f-' + f.toLowerCase()).classList.add('active-tab');
            renderDisplay();
        }

        function openDetail(sym) {
            const d = marketData.find(x => x.symbol === sym);
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('m-symbol').innerText = sym;
            document.getElementById('m-entry').innerText = `$${d.price.toLocaleString()}`;
            document.getElementById('m-sl').innerText = `$${d.sl.toFixed(5)}`;
            document.getElementById('m-tp').innerText = `$${d.tp.toFixed(5)}`;
            document.getElementById('m-reasons').innerHTML = d.reasons.map(r => `<div>• ${r}</div>`).join('');
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:" + sym, "interval": "60",
                "theme": "dark", "container_id": "tv-box", "hide_top_toolbar": true, "hide_side_toolbar": true
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        fetchKurs();
    </script>
</body>
</html>
