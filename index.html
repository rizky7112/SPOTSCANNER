<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORE V6.8</title>
    
    <!-- Tailwind CSS CDN - Optimized for Production-like usage -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Konfigurasi Tailwind (harus sebelum penggunaan class)
        tailwind.config = {
            content: ["./**/*.{html,js}"],
            theme: {
                extend: {}
            },
            plugins: [],
        }
    </script>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0b0f19; 
            color: #f1f5f9; 
            margin: 0; 
        }
        
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.98); }
        .btn-f { background: #1f2937; color: #9ca3af; padding: 8px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid #374151; flex-shrink: 0; }
        .btn-f.active { background: #059669; color: #fff; border-color: #059669; }
        .search-input { background: #111827; border: 1px solid #1f2937; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 13px; width: 100%; outline: none; }
        .search-input:focus { border-color: #059669; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .b-BUY { background: #064e3b; color: #34d399; }
        .b-NETRAL { background: #1f2937; color: #94a3b8; }
        .b-WARNING { background: #450a0a; color: #f87171; }
        .reason-text { font-size: 9px; color: #64748b; text-transform: uppercase; margin-top: 4px; font-weight: 600; }
        select { background: #1f2937; color: #9ca3af; border: 1px solid #374151; padding: 8px; border-radius: 6px; font-size: 10px; font-weight: 700; outline: none; }
    </style>
</head>
<body class="pb-24">
<header class="sticky top-0 z-50 bg-[#0b0f19]/95 border-b border-gray-800 px-4 pt-6 pb-5 backdrop-blur-md">
    <div class="max-w-xl mx-auto mb-5">
        <h1 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Market Monitor <span class="text-white">by R.F.R</span></h1>
       
        <input type="text" id="search-bar" oninput="render()" placeholder="Cari koin (misal: BTC, ENA)..." class="search-input mb-4">
       
        <div class="flex items-center justify-between gap-2 overflow-x-auto no-scrollbar">
            <div class="flex gap-2">
                <button onclick="setFil('ALL',this)" class="btn-f active">SEMUA</button>
                <button onclick="setFil('BUY',this)" class="btn-f">BUY</button>
                <button onclick="setFil('WARNING',this)" class="btn-f">WARNING</button>
            </div>
           
            <select id="sort-filter" onchange="render()">
                <option value="SCORE">SORTIR: SCORE</option>
                <option value="VOL">SORTIR: VOLUME</option>
                <option value="PROFIT">SORTIR: POTENSI</option>
            </select>
        </div>
    </div>
</header>
<main id="konten" class="px-4 py-2 max-w-xl mx-auto space-y-3"></main>

<div id="modal" class="fixed inset-0 z-[60] hidden flex flex-col bg-[#0b0f19]">
    <div class="px-5 py-4 border-b border-gray-800 flex justify-between items-center bg-[#111827]">
        <h2 id="m-sym" class="font-bold text-white text-lg">---</h2>
        <button onclick="closeModal()" class="text-3xl text-gray-500">&times;</button>
    </div>
    <div class="flex-1 overflow-y-auto p-5 space-y-6 max-w-xl mx-auto w-full">
        <div id="tv-box" class="w-full h-[350px] rounded-lg border border-gray-800 bg-black overflow-hidden"></div>
        <div id="m-audit" class="p-5 bg-[#111827] border border-gray-800 rounded-lg space-y-3 text-[11px] font-semibold text-gray-400 uppercase text-xs"></div>
    </div>
</div>

<script>
// === LOGIC & FUNCTION tetap sama seperti sebelumnya ===
const API_URL = "https://script.google.com/macros/s/AKfycbzPTDN_tK_r7HjECRSKbpmJCv5ErZsRslw7iqrJ1g4-HrAxVciCMyBatbvgEi8WdZMdNw/exec";
let db = [], currentFil = 'ALL';

function technicalLogic(t) {
    const last = parseFloat(t.last), hi = parseFloat(t.high), lo = parseFloat(t.low), 
          vol = parseFloat(t.vol_idr), bid = parseFloat(t.buy), ask = parseFloat(t.sell);
   
    const pir = ((last - lo) / (hi - lo)) * 100 || 50;
    const range = ((hi - lo) / lo) * 100;
    const spread = ((ask - bid) / bid) * 100;
    const volStrength = vol > 1.2e9 ? (vol / 1.2e9) : 0;

    let rsi = 50 + (pir - 50) * 1.05;
    rsi = rsi + (volStrength > 2.5 ? 10 : volStrength > 1.5 ? 5 : 0);
    rsi = Math.max(22, Math.min(78, rsi));

    let tfShort = 48, tfMedium = 48, tfLong = 48;

    if (pir < 40) tfShort = rsi < 45 ? 78 : 65;
    else if (pir < 52) tfShort = 60;

    if (volStrength > 2 && pir < 48) tfMedium = 76;
    else if (pir < 45) tfMedium = 64;

    if (pir < 42 && volStrength > 1.3) tfLong = 72;
    else if (pir < 50) tfLong = 58;

    const tfAlignment = (tfShort + tfMedium + tfLong) / 3;
    const tfConsensus = (tfShort > 58 ? 1 : 0) + (tfMedium > 58 ? 1 : 0) + (tfLong > 58 ? 1 : 0);

    let score = 42;
    let reason = "Neutral Market";

    const isNearSupport = pir >= 22 && pir <= 41;
    const hasMomentum = last > (lo * 1.018);
    const isOversold = rsi < 46 && rsi > 28;
    const isSafeEntry = hasMomentum && spread < 1.6 && tfAlignment > 55;
    const isOverbought = rsi > 70 || pir > 87;

    if (isNearSupport && isOversold && isSafeEntry && tfConsensus >= 1) {
        score = 86;
        reason = "Safe RSI + MTF Entry";
    }
    else if (isNearSupport && isOversold && tfConsensus >= 2) {
        score = 74;
        reason = "MTF Supported Rebound";
    }
    else if (isNearSupport && isOversold && hasMomentum) {
        score = 64;
        reason = "Early RSI Recovery";
    }
    else if (tfConsensus >= 2 && rsi < 52) {
        score = 68;
        reason = "MTF Bullish Alignment";
    }
    else if (isOverbought) {
        score = 16;
        reason = "Overbought - High Risk";
    }

    score = Math.round(score * (tfAlignment / 72));
    score = Math.min(93, Math.max(12, score));

    let status = 'NETRAL';
    if (pir > 93 || spread > 4.5) status = 'WARNING';
    else if (score >= 68) status = 'BUY';

    let potential = (range * 1.1) + (score / 11);
    potential = Math.min(Math.max(potential, 6.0), 44);

    return {
        s: t.pair.replace('_idr','').toUpperCase(),
        p: last,
        lb: status,
        score: Math.round(score),
        reason: reason,
        vol: vol,
        tp: last * (1 + potential/100),
        sl: last * (1 - potential * 0.32/100),
        potential: parseFloat(potential.toFixed(1))
    };
}

// ... (bagian fetchData, render, openModal, dll tetap sama seperti versi sebelumnya)

async function fetchData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        let list = [];
        for (const key in data.tickers) {
            if (key.endsWith('_idr')) {
                const r = technicalLogic({ pair: key, ...data.tickers[key] });
                if (r) list.push(r);
            }
        }
        db = list;
        render();
    } catch (e) { console.error("Sync Error"); }
}

function render() { /* ... sama seperti sebelumnya ... */ }
function openModal(symbol) { /* ... sama ... */ }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function setFil(f, b) {
    currentFil = f;
    document.querySelectorAll('.btn-f').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
