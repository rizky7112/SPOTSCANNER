<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RZKY SPOT | V33 BOTTOM HUNTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #040508; color: #cbd5e1; }
        .card-pro { background: #0f121a; border: 1px solid #1e293b; border-radius: 12px; }
        .btn-f { background: #1e293b; color: #94a3b8; padding: 8px 16px; border-radius: 8px; font-size: 10px; font-weight: 800; border: 1px solid transparent; }
        .btn-f.active { background: #ffffff; color: #000; border-color: #fff; }
        .buy-badge { background: #00ff88; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .pot-badge { background: #0ea5e9; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .warn-badge { background: #ef4444; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-50 bg-[#040508]/95 border-b border-slate-800 p-5">
        <div class="max-w-xl mx-auto flex justify-between items-center mb-4">
            <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">RZKY <span class="text-cyan-400">SPOT</span></h1>
            <button onclick="tarikData()" id="btn" class="bg-cyan-500 text-black font-black px-5 py-2 rounded-lg text-[10px] uppercase">SCAN MARKET</button>
        </div>
        
        <div class="max-w-xl mx-auto flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <button onclick="setFil('ALL', this)" class="btn-f active">SEMUA</button>
            <button onclick="setFil('BUY', this)" class="btn-f text-green-400">BUY (BOTTOM)</button>
            <button onclick="setFil('POTENSIAL BREAKOUT', this)" class="btn-f text-cyan-400">BREAKOUT</button>
            <button onclick="setFil('WARNING', this)" class="btn-f text-red-400">WARNING</button>
        </div>
    </header>

    <main id="konten" class="px-4 py-6 max-w-xl mx-auto space-y-3">
        <div class="text-center py-20 text-slate-600 text-[10px] uppercase tracking-widest italic">Target: Beli Murah, Jual Mahal. Klik Scan.</div>
    </main>

    <div id="modal" class="fixed inset-0 z-[60] hidden bg-black flex flex-col">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-[#040508]">
            <h2 id="m-sym" class="font-black text-white uppercase tracking-tighter">---</h2>
            <button onclick="closeModal()" class="text-white text-3xl font-light p-2">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div id="tv-box" class="w-full h-[350px] rounded-2xl border border-slate-800 bg-black"></div>
            <div class="grid grid-cols-3 gap-2">
                <div class="p-3 bg-slate-900 rounded-xl border border-slate-800 text-center">
                    <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">ENTRY (MURAH)</p>
                    <p id="m-entry" class="text-[10px] font-black text-white"></p>
                </div>
                <div class="p-3 bg-slate-900 rounded-xl border border-green-900/50 text-center">
                    <p class="text-[8px] text-green-500 font-bold uppercase mb-1">TP TARGET</p>
                    <p id="m-tp" class="text-[10px] font-black text-green-400"></p>
                </div>
                <div class="p-3 bg-slate-900 rounded-xl border border-red-900/50 text-center">
                    <p class="text-[8px] text-red-500 font-bold uppercase mb-1">STOP LOSS</p>
                    <p id="m-sl" class="text-[10px] font-black text-red-400"></p>
                </div>
            </div>
            <div id="m-audit" class="p-3 bg-slate-900/50 border border-slate-800 rounded-xl text-[9px] text-slate-400 font-bold uppercase space-y-1"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzPTDN_tK_r7HjECRSKbpmJCv5ErZsRslw7iqrJ1g4-HrAxVciCMyBatbvgEi8WdZMdNw/exec";
        let db = [], currentFil = 'ALL';

        async function tarikData() {
            const btn = document.getElementById('btn');
            btn.innerText = "HUNTING BOTTOM...";
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const tickers = data.tickers;
                db = [];
                for (let key in tickers) {
                    if (key.endsWith('_idr')) db.push(analyzeBottom(key, tickers[key]));
                }
                render();
            } catch (err) {
                alert("API Limit!");
            } finally {
                btn.innerText = "SCAN MARKET";
            }
        }

        function analyzeBottom(pair, ticker) {
            const last = parseFloat(ticker.last), hi = parseFloat(ticker.high), lo = parseFloat(ticker.low), vol = parseFloat(ticker.vol_idr);
            const sym = pair.split('_')[0].toUpperCase();
            const rsi = Math.round(((last - lo) / (hi - lo)) * 100);
            const gainFromLow = ((last - lo) / lo) * 100;
            const range = (hi - lo) / lo;
            
            let lb = "NORMAL", bd = "", sc = 50, audit = [];

            if (gainFromLow > 7 || rsi > 60) {
                if (last >= hi * 0.98) { lb = "POTENSIAL BREAKOUT"; bd = "pot-badge"; sc = 70; audit.push("UJI RESISTANCE (HATI-HATI)"); }
                else { lb = "WARNING"; bd = "warn-badge"; sc = 20; audit.push("HARGA SUDAH TERLALU TINGGI"); }
            } 
            else if (gainFromLow <= 5 && rsi < 55 && vol > 800000000) {
                lb = "BUY"; bd = "buy-badge"; sc = 95;
                audit.push("AREA AKUMULASI BAWAH (MURAH)");
                audit.push("VOLUME WHALE TERDETEKSI");
            }

            if (range < 0.03) audit.push("SEDANG SIDEWAYS (SQUEEZE)");

            return { s: sym, p: last, lb, bd, sc, rsi, entry: last, tp: last * 1.07, sl: last * 0.965, audit };
        }

        function setFil(f, btn) {
            currentFil = f;
            document.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const container = document.getElementById('konten');
            let filtered = (currentFil === 'ALL') ? db : db.filter(x => x.lb === currentFil);
            let sorted = filtered.sort((a,b) => b.sc - a.sc);
            
            if (sorted.length === 0) {
                container.innerHTML = `<div class='text-center py-10 text-slate-600 uppercase text-[10px]'>Kosong di kategori ${currentFil}</div>`;
                return;
            }

            container.innerHTML = sorted.map(x => `
                <div class="card-pro p-4 flex justify-between items-center border-l-4 ${getClr(x.lb)}" onclick="openModal('${x.s}')">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-md font-black text-white">${x.s}</span>
                            ${x.bd ? `<span class="${x.bd}">${x.lb}</span>` : ''}
                        </div>
                        <p class="text-[8px] text-slate-500 font-bold uppercase mt-1">RSI: ${x.rsi}% | VOL: IDR ${(x.sc > 50 ? 'Gede' : 'Kecil')}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[12px] font-black text-white">Rp ${x.p.toLocaleString('id-ID')}</p>
                        <p class="text-[8px] text-cyan-400 font-bold tracking-tighter italic">CEK AREA BAWAH</p>
                    </div>
                </div>
            `).join('');
        }

        function getClr(lb) {
            return lb==='BUY'?'border-green-400':(lb==='POTENSIAL BREAKOUT'?'border-cyan-400':(lb==='WARNING'?'border-red-500':'border-slate-800'));
        }

        function openModal(s) {
            const x = db.find(i => i.s === s);
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('m-sym').innerText = s;
            document.getElementById('m-entry').innerText = "Rp " + x.entry.toLocaleString('id-ID');
            document.getElementById('m-tp').innerText = "Rp " + Math.round(x.tp).toLocaleString('id-ID');
            document.getElementById('m-sl').innerText = "Rp " + Math.round(x.sl).toLocaleString('id-ID');
            document.getElementById('m-audit').innerHTML = x.audit.map(a => `<div>• ${a}</div>`).join('');
            
            document.getElementById('tv-box').innerHTML = "";
            
            // Perbaikan simbol: Pastikan format BINANCE:SYMBCLUSDT agar chart selalu muncul
            const cleanSymbol = s.replace(/[^a-zA-Z0-9]/g, "");
            
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + cleanSymbol + "USDT",
                "interval": "60",
                "theme": "dark",
                "container_id": "tv-box",
                "style": "1",
                "locale": "id",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "hide_side_toolbar": false
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
