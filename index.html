<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RZKY DASHBOARD | V6.6 STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #f1f5f9; margin: 0; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: #374151; }
        .btn-f { background: #1f2937; color: #9ca3af; padding: 8px 16px; border-radius: 6px; font-size: 11px; font-weight: 700; border: 1px solid #374151; }
        .btn-f.active { background: #059669; color: #fff; border-color: #059669; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .b-BUY      { background: #064e3b; color: #34d399; }
        .b-NETRAL   { background: #374151; color: #d1d5db; }
        .b-WARNING  { background: #7f1d1d; color: #f87171; }
        .reason-tag { font-size: 9px; font-weight: 800; color: #6b7280; text-transform: uppercase; margin-top: 4px; display: block; }
    </style>
</head>
<body class="pb-20">

<header class="sticky top-0 z-50 bg-[#0b0f19]/95 border-b border-gray-800 px-4 py-5 backdrop-blur-md">
    <div class="max-w-xl mx-auto flex justify-between items-center mb-5">
        <div>
            <h1 class="text-lg font-black tracking-tight text-white uppercase italic">RZKY <span class="text-emerald-500">STABLE V6.6</span></h1>
            <p id="scan-info" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">Filter: Anti-Noise Active</p>
        </div>
    </div>
    <div class="max-w-xl mx-auto flex gap-2 overflow-x-auto no-scrollbar">
        <button onclick="setFil('ALL',this)" class="btn-f active">DASHBOARD</button>
        <button onclick="setFil('BUY',this)" class="btn-f">BUY SIGNALS</button>
        <button onclick="setFil('WARNING',this)" class="btn-f">DANGER ZONE</button>
    </div>
</header>

<main id="konten" class="px-4 py-4 max-w-xl mx-auto space-y-3"></main>

<div id="modal" class="fixed inset-0 z-[60] hidden flex flex-col bg-[#0b0f19]">
    <div class="px-5 py-4 border-b border-gray-800 flex justify-between items-center bg-[#111827]">
        <h2 id="m-sym" class="font-black text-white text-xl uppercase">---</h2>
        <button onclick="closeModal()" class="text-3xl text-gray-500">&times;</button>
    </div>
    <div class="flex-1 overflow-y-auto p-5 space-y-6 max-w-xl mx-auto w-full">
        <div id="tv-box" class="w-full h-[350px] rounded-lg border border-gray-800 bg-black overflow-hidden"></div>
        <div id="m-audit" class="p-5 bg-[#111827] border border-gray-800 rounded-lg space-y-2 text-[11px] font-bold text-gray-400 uppercase"></div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzPTDN_tK_r7HjECRSKbpmJCv5ErZsRslw7iqrJ1g4-HrAxVciCMyBatbvgEi8WdZMdNw/exec";
let db = [], currentFil = 'ALL';

function stableNeuralLogic(t) {
    const last = parseFloat(t.last), hi = parseFloat(t.high), lo = parseFloat(t.low), vol = parseFloat(t.vol_idr);
    const bid = parseFloat(t.buy), ask = parseFloat(t.sell);
    
    const pir = ((last - lo) / (hi - lo)) * 100;
    const spread = ((ask - bid) / bid) * 100;
    const range = ((hi - lo) / lo) * 100;
    
    let score = 0, reason = "Neutral Market", logs = [];

    // 1. POSITIONING (BB/PIR)
    if (pir < 40) score += 30;
    
    // 2. VOLUME STABILITY (Anti-Labil)
    if (vol > 2e9) score += 30;

    // 3. SPREAD QUALITY
    if (spread < 1.0) score += 40;

    let status = 'NETRAL';
    // STABLE FILTER: Sinyal hanya WARNING jika resiko benar-benar fatal
    if (pir > 96 || (spread > 4.5 && vol < 5e8)) {
        status = 'WARNING';
        reason = "High Spread / Overbought";
    } else if (score >= 60 && pir < 60) {
        status = 'BUY';
        reason = (pir < 30) ? "Strong Accumulation" : "Trend Continuation";
    } else {
        reason = "Waiting for Confirmation";
    }

    // Dynamic Logic for TP/SL
    let potential = (range * 1.2) + (score / 12);
    potential = Math.min(Math.max(potential, 4.0), 45);

    return { 
        s: t.pair.replace('_idr','').toUpperCase(), 
        p: last, lb: status, score, reason, 
        tp: last*(1+potential/100), sl: last*(1-potential*0.45/100), 
        potential: potential.toFixed(1) 
    };
}

async function fetchData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        let list = [];
        for (const key in data.tickers) {
            if (key.endsWith('_idr')) {
                const r = stableNeuralLogic({ pair: key, ...data.tickers[key] });
                if (r) list.push(r);
            }
        }
        db = list;
        render();
        document.getElementById('scan-info').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
    } catch (e) { console.error("Sync Error"); }
}

function render() {
    const el = document.getElementById('konten');
    let filtered = db.filter(x => currentFil === 'ALL' ? true : x.lb === currentFil)
    .sort((a,b) => b.score - a.score);

    el.innerHTML = filtered.map(x => `
        <div class="card p-5" onclick="openModal('${x.s}')">
            <div class="flex justify-between items-start">
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-base font-black text-white italic">${x.s}</span>
                        <span class="badge b-${x.lb}">${x.lb}</span>
                    </div>
                    <span class="reason-tag">${x.reason}</span>
                </div>
                <div class="text-right">
                    <p class="text-sm font-black text-white">Rp ${x.p.toLocaleString('id-ID')}</p>
                    <p class="text-[11px] font-bold text-emerald-500 mt-1 uppercase">Target: +${x.potential}%</p>
                </div>
            </div>
        </div>
    `).join('');
}

function openModal(symbol) {
    const x = db.find(i => i.s === symbol);
    if (!x) return;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('m-sym').innerText = x.s;
    document.getElementById('m-audit').innerHTML = `
        <div class="flex justify-between border-b border-gray-800 pb-2"><span>Status</span><span class="text-emerald-400">${x.lb}</span></div>
        <div class="flex justify-between border-b border-gray-800 pb-2 pt-2"><span>Potential</span><span class="text-emerald-400">+${x.potential}%</span></div>
        <div class="flex justify-between border-b border-gray-800 pb-2 pt-2"><span>Entry</span><span>Rp ${x.p.toLocaleString('id-ID')}</span></div>
        <div class="flex justify-between border-b border-gray-800 pb-2 pt-2 text-emerald-400"><span>Target TP</span><span>Rp ${Math.round(x.tp).toLocaleString('id-ID')}</span></div>
        <div class="flex justify-between pt-2 text-red-400"><span>Stop Loss</span><span>Rp ${Math.round(x.sl).toLocaleString('id-ID')}</span></div>
    `;
    
    document.getElementById('tv-box').innerHTML = '';
    new TradingView.widget({
        autosize: true, symbol: 'BINANCE:' + x.s + 'USDT',
        interval: '60', theme: 'dark', container_id: 'tv-box', style: '1', locale: 'id', hide_side_toolbar: true,
        studies: ['BollingerBands@tv-basicstudies','RSI@tv-basicstudies','OnBalanceVolume@tv-basicstudies','ChaikinMoneyFlow@tv-basicstudies','MoneyFlow@tv-basicstudies']
    });
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function setFil(f, b) {
    currentFil = f;
    document.querySelectorAll('.btn-f').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
